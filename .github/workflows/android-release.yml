name: Android Release APK

on:
  push:
    branches:
      - main
    paths:
      - 'noland-earthworks-mobile/**'
      - '.github/workflows/android-release.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    name: Build Signed Release APK
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: noland-earthworks-mobile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-mobile-${{ hashFiles('noland-earthworks-mobile/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-mobile-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web assets
        run: pnpm build

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor to Android
        run: npx cap sync android

      - name: Copy Noland Earthworks app icons
        run: |
          for density in mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            cp android-icons/$density/ic_launcher.png android/app/src/main/res/$density/ic_launcher.png
            cp android-icons/$density/ic_launcher_round.png android/app/src/main/res/$density/ic_launcher_round.png
            cp android-icons/$density/ic_launcher_foreground.png android/app/src/main/res/$density/ic_launcher_foreground.png
          done
          echo "App icons replaced successfully"

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('noland-earthworks-mobile/android/**/*.gradle*', 'noland-earthworks-mobile/android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Decode signing keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | tr -d '\n\r ' | base64 --decode > android/app/noland-field-release.keystore
          ls -la android/app/noland-field-release.keystore

      - name: Build signed release APK
        run: |
          KEYSTORE_PATH="$(pwd)/android/app/noland-field-release.keystore"
          cd android && ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="$KEYSTORE_PATH" \
            -Pandroid.injected.signing.store.password="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.ANDROID_KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.ANDROID_KEY_PASSWORD }}"

      - name: Get app version
        id: app_version
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Rename APK with version
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk \
             android/app/build/outputs/apk/release/noland-field-v${{ steps.app_version.outputs.VERSION }}.apk

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: noland-field-v${{ steps.app_version.outputs.VERSION }}-release
          path: noland-earthworks-mobile/android/app/build/outputs/apk/release/noland-field-v${{ steps.app_version.outputs.VERSION }}.apk
          retention-days: 30
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: mobile-v${{ steps.app_version.outputs.VERSION }}-build${{ github.run_number }}
          name: "Noland Field v${{ steps.app_version.outputs.VERSION }} (Build ${{ github.run_number }})"
          body: |
            ## Noland Field v${{ steps.app_version.outputs.VERSION }}

            Automated release build from commit ${{ github.sha }}.

            ### Install
            1. Download `noland-field-v${{ steps.app_version.outputs.VERSION }}.apk` below
            2. On your Android phone: Settings → Security → Install unknown apps → allow your browser
            3. Open the downloaded APK and tap Install

            ### What changed
            See commit history for details.
          files: noland-earthworks-mobile/android/app/build/outputs/apk/release/noland-field-v${{ steps.app_version.outputs.VERSION }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
